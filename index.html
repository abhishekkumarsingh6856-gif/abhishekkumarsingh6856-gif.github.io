<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatgram - Share Your Moments</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #E1306C;
            --primary-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --bg-dark: #000000;
            --bg-card: #000000;
            --bg-secondary: #121212;
            --bg-tertiary: #1e1e1e;
            --border: #262626;
            --text-primary: #fafafa;
            --text-secondary: #a8a8a8;
            --text-muted: #737373;
            --blue: #0095f6;
            --red: #ed4956;
            --green: #58c322;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* ============ AUTH SCREENS ============ */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background: radial-gradient(ellipse at top left, rgba(225,48,108,0.15), transparent 50%),
                        radial-gradient(ellipse at bottom right, rgba(136,44,222,0.15), transparent 50%),
                        var(--bg-dark);
        }

        .auth-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-logo {
            font-size: 42px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 12px;
            text-align: left;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--text-muted);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }

        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span { padding: 0 16px; }

        .auth-link {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 20px;
        }

        .auth-link a {
            color: var(--blue);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .auth-link a:hover { text-decoration: underline; }

        .forgot-link {
            color: var(--blue);
            font-size: 12px;
            text-decoration: none;
            display: block;
            margin-top: 16px;
        }

        /* ============ MAIN APP LAYOUT ============ */
        .app-container {
            display: none;
            height: 100vh;
        }

        .app-layout {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 245px;
            border-right: 1px solid var(--border);
            padding: 24px 12px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
            background: var(--bg-dark);
        }

        .sidebar-logo {
            font-size: 26px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            padding: 12px 16px;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
            cursor: pointer;
        }

        .nav-menu {
            flex: 1;
            list-style: none;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 4px;
            font-size: 15px;
            text-decoration: none;
            color: var(--text-primary);
            position: relative;
        }

        .nav-item:hover { background: var(--bg-tertiary); }
        .nav-item.active { font-weight: 700; }

        .nav-item svg {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .nav-badge {
            position: absolute;
            top: 6px;
            left: 28px;
            background: var(--red);
            color: white;
            font-size: 10px;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }

        .sidebar-footer {
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 245px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .content-area {
            width: 100%;
            max-width: 630px;
            padding: 20px 20px 80px;
        }

        .content-wide {
            max-width: 935px;
        }

        /* ============ STORIES ============ */
        .stories-container {
            display: flex;
            gap: 16px;
            padding: 16px 0;
            overflow-x: auto;
            scrollbar-width: none;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .stories-container::-webkit-scrollbar { display: none; }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .story-ring {
            width: 66px;
            height: 66px;
            border-radius: 50%;
            padding: 3px;
            background: var(--primary-gradient);
            position: relative;
        }

        .story-ring.no-story {
            background: var(--border);
        }

        .story-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--bg-dark);
            object-fit: cover;
        }

        .story-add {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 22px;
            height: 22px;
            background: var(--blue);
            border: 2px solid var(--bg-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 700;
        }

        .story-name {
            font-size: 11px;
            color: var(--text-secondary);
            max-width: 66px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: center;
        }

        /* ============ POSTS / FEED ============ */
        .post-card {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }

        .post-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
        }

        .post-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }

        .post-user-info {
            flex: 1;
        }

        .post-username {
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        .post-username:hover { opacity: 0.7; }

        .post-location {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .post-more {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 20px;
            padding: 8px;
            letter-spacing: 2px;
        }

        .post-image-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            overflow: hidden;
            background: var(--bg-tertiary);
        }

        .post-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .double-tap-heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 80px;
            color: white;
            pointer-events: none;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            z-index: 10;
        }

        .double-tap-heart.animate {
            animation: heartBurst 0.8s ease-in-out forwards;
        }

        @keyframes heartBurst {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        .post-actions {
            display: flex;
            align-items: center;
            padding: 12px 16px 8px;
            gap: 16px;
        }

        .post-action-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            padding: 4px;
            transition: opacity 0.2s, transform 0.15s;
        }

        .post-action-btn:hover { opacity: 0.7; }
        .post-action-btn:active { transform: scale(0.9); }

        .post-action-btn svg {
            width: 24px;
            height: 24px;
        }

        .post-action-btn.liked { color: var(--red); }
        .post-action-btn.liked svg { fill: var(--red); }
        .post-action-btn.saved svg { fill: var(--text-primary); }

        .post-action-right { margin-left: auto; }

        .post-likes {
            padding: 0 16px 4px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        .post-caption {
            padding: 0 16px 8px;
            font-size: 14px;
            line-height: 1.5;
        }

        .post-caption strong {
            cursor: pointer;
        }

        .post-caption strong:hover { opacity: 0.7; }

        .post-comments-link {
            padding: 0 16px 4px;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
        }

        .post-time {
            padding: 4px 16px 12px;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .post-add-comment {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            gap: 12px;
        }

        .post-add-comment input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .post-add-comment input::placeholder { color: var(--text-muted); }

        .post-add-comment .btn-post {
            background: none;
            border: none;
            color: var(--blue);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            opacity: 0.5;
        }

        .post-add-comment .btn-post.active { opacity: 1; }

        /* ============ SUGGESTIONS SIDEBAR ============ */
        .right-sidebar {
            width: 320px;
            padding: 32px 24px;
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .user-card img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-card-info { flex: 1; }
        .user-card-name { font-weight: 600; font-size: 14px; }
        .user-card-sub { font-size: 12px; color: var(--text-muted); }

        .btn-follow {
            background: none;
            border: none;
            color: var(--blue);
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
        }

        .btn-follow:hover { color: var(--text-primary); }

        .suggestions-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .footer-links {
            margin-top: 32px;
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.8;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
        }

        .footer-links a:hover { text-decoration: underline; }
        .footer-copyright { margin-top: 16px; font-size: 11px; color: #363636; }

        /* ============ PROFILE PAGE ============ */
        .profile-header {
            display: flex;
            gap: 40px;
            padding: 30px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .profile-pic-large {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .profile-info { flex: 1; }

        .profile-top-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .profile-username {
            font-size: 22px;
            font-weight: 400;
        }

        .btn-profile {
            padding: 7px 20px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 8px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-profile:hover { background: var(--border); }

        .btn-message {
            padding: 7px 20px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 8px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        .profile-stats {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
        }

        .profile-stat {
            font-size: 16px;
        }

        .profile-stat strong { font-weight: 700; }

        .profile-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .profile-bio { font-size: 14px; line-height: 1.5; }

        .profile-tabs {
            display: flex;
            justify-content: center;
            gap: 60px;
            border-bottom: 1px solid var(--border);
        }

        .profile-tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 16px 0;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            cursor: pointer;
            border-top: 1px solid transparent;
            margin-top: -1px;
        }

        .profile-tab.active {
            color: var(--text-primary);
            border-top-color: var(--text-primary);
        }

        .profile-tab svg { width: 12px; height: 12px; }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            margin-top: 4px;
        }

        .profile-grid-item {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            cursor: pointer;
        }

        .profile-grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.2s;
        }

        .profile-grid-item:hover img { opacity: 0.7; }

        .grid-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            background: rgba(0,0,0,0.3);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .profile-grid-item:hover .grid-overlay { opacity: 1; }

        .grid-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 16px;
        }

        /* ============ EXPLORE PAGE ============ */
        .explore-search {
            position: sticky;
            top: 0;
            background: var(--bg-dark);
            padding: 16px 0;
            z-index: 10;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px 12px 40px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            position: relative;
        }

        .search-input:focus { border-color: var(--text-muted); }

        .search-wrapper {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .explore-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }

        .explore-item {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            cursor: pointer;
            border-radius: 4px;
        }

        .explore-item.large {
            grid-row: span 2;
            grid-column: span 2;
        }

        .explore-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.2s;
        }

        .explore-item:hover img { opacity: 0.7; }

        .explore-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: rgba(0,0,0,0.3);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .explore-item:hover .explore-overlay { opacity: 1; }

        /* ============ REELS PAGE ============ */
        .reels-container {
            max-width: 400px;
            margin: 0 auto;
        }

        .reel-card {
            position: relative;
            width: 100%;
            height: 80vh;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
            background: var(--bg-tertiary);
            scroll-snap-align: start;
        }

        .reel-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .reel-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 80px 16px 24px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }

        .reel-user {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .reel-user img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .reel-username { font-weight: 600; font-size: 14px; }

        .btn-reel-follow {
            padding: 4px 14px;
            border: 1px solid white;
            border-radius: 8px;
            background: none;
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .reel-caption { font-size: 14px; line-height: 1.4; margin-bottom: 8px; }

        .reel-music {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .reel-actions {
            position: absolute;
            right: 16px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .reel-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: white;
            cursor: pointer;
        }

        .reel-action svg { width: 28px; height: 28px; }
        .reel-action span { font-size: 12px; font-weight: 600; }

        /* ============ CREATE POST MODAL ============ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg-secondary);
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow: hidden;
            animation: modalIn 0.2s ease-out;
        }

        @keyframes modalIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h3 { font-size: 16px; font-weight: 600; }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            max-height: 60vh;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 48px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .upload-area:hover { border-color: var(--text-muted); }

        .upload-area svg { width: 48px; height: 48px; color: var(--text-muted); margin-bottom: 16px; }
        .upload-area p { color: var(--text-muted); font-size: 14px; }

        .upload-preview {
            display: none;
            text-align: center;
        }

        .upload-preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            object-fit: contain;
        }

        .caption-input {
            width: 100%;
            min-height: 80px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 12px;
            font-size: 14px;
            resize: vertical;
            outline: none;
            margin-top: 16px;
            font-family: inherit;
        }

        .caption-input:focus { border-color: var(--text-muted); }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn-share {
            padding: 8px 24px;

            height: 100%;

            left: 0;
            right: 0;

            gap: 12px;
            z-index: 10;

            color: white;
            font-size: 14px;
            outline: none;

            border: 1px solid var(--border);

        .chat-area {

            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

            width: 36px;
            height: 36px;
            border-radius: 50%;
        }

        .chat-header-info { flex: 1; }
        .chat-header-name { font-weight: 600; font-size: 15px; }
        .chat-header-status { font-size: 12px; color: var(--text-muted); }

            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

            max-width: 65%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }

        .chat-bubble.sent {
            align-self: flex-end;
            background: var(--blue);
            color: white;

        }

            gap: 12px;
            padding: 16px 20px;
            border-top: 1px solid var(--border);

            height: 44px;
            border-radius: 50%;

            flex: 1;
            font-size: 14px;
            line-height: 1.4;

            width: 44px;
            height: 44px;
            object-fit: cover;

            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;

            color: var(--text-primary);

        /* ============ PAGE HEADERS ============ */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: var(--bg-dark);
            z-index: 10;
        }

        .page-header h1 { font-size: 22px; font-weight: 700; }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;

        /* ============ RESPONSIVE ============ */
        @media (max-width: 1024px) {
            .right-sidebar { display: none; }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 72px;
                padding: 16px 8px;
                align-items: center;
            }

            .sidebar-logo { font-size: 0; padding: 12px; }
            .sidebar-logo::before { content: '✦'; font-size: 24px; -webkit-text-fill-color: initial; background: none; }

            .nav-item span { display: none; }
            .nav-item { justify-content: center; padding: 12px; }

            .main-content { margin-left: 72px; }

            .profile-header { flex-direction: column; align-items: center; text-align: center; }
            .profile-stats { justify-content: center; }
            .profile-top-row { justify-content: center; }
        }

        @media (max-width: 480px) {
            .sidebar {
                position: fixed;
                bottom: 0;
                top: auto;
                left: 0;
                right: 0;
                width: 100%;
                height: 60px;
                flex-direction: row;
                justify-content: space-around;
                padding: 8px 0;
                border-right: none;
                border-top: 1px solid var(--border);
            }

            .sidebar-logo { display: none; }
            .sidebar-footer { display: none; }
            .nav-menu { display: flex; align-items: center; justify-content: space-around; width: 100%; }
            .nav-item { margin: 0; padding: 8px; }
            .nav-badge { left: 20px; top: 2px; }

            .main-content { margin-left: 0; padding-bottom: 70px; }
            .content-area { padding: 12px; }
        }

        /* ============ ANIMATIONS ============ */
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .heart-animation {
            animation: heartLike 0.3s ease-in-out;
        }

        @keyframes heartLike {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* Page visibility */
        .page { display: none; }
        .page.active { display: block; }

        /* Tooltip */
        .tooltip {
            position: relative;
        }

        /* Loading shimmer */
        .shimmer {
            background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--border) 50%, var(--bg-tertiary) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
